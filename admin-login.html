<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ログイン - Future Insight Workspace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background-color: #2c1810;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .app-header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .app-header .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            color: #ffe8d7;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .app-header p {
            color: #c8a898;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 36px 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #333;
            background: #f7fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #783c28;
            box-shadow: 0 0 0 3px rgba(120, 60, 40, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #783c28;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .submit-btn:hover { background: #a0503c; }
        .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

        .error-message {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #fed7d7;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
        }

        .footer a {
            color: #c8a898;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(44, 24, 16, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #c87864;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            .app-header h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="app-header">
            <h1>Future Insight Workspace</h1>
            <span class="badge">Admin</span>
            <p>管理者専用ログインページ</p>
        </div>

        <div class="card">
            <h2>管理者ログイン</h2>
            <div id="errorMessage" class="error-message"></div>

            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">メールアドレス</label>
                    <input type="email" id="loginEmail" required autocomplete="email" placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">パスワード</label>
                    <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="パスワードを入力">
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">ログイン</button>
            </form>
        </div>

        <div class="footer">
            <a href="index.html">一般ユーザーのログインはこちら</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js?v=2"></script>

    <script>
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
        }

        function clearError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function setLoading(on) {
            document.getElementById('loadingOverlay').classList.toggle('active', on);
            document.getElementById('loginBtn').disabled = on;
        }

        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'メールアドレスの形式が正しくありません。',
                'auth/user-disabled': 'このアカウントは無効化されています。',
                'auth/user-not-found': 'このメールアドレスは登録されていません。',
                'auth/wrong-password': 'パスワードが正しくありません。',
                'auth/invalid-credential': 'メールアドレスまたはパスワードが正しくありません。',
                'auth/too-many-requests': 'ログイン試行回数が多すぎます。しばらく待ってから再度お試しください。',
                'auth/network-request-failed': 'ネットワークエラーが発生しました。接続を確認してください。',
            };
            return messages[code] || 'エラーが発生しました。もう一度お試しください。';
        }

        // If already logged in as admin, redirect immediately
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists && doc.data().role === 'admin' && doc.data().status === 'active') {
                        window.location.href = 'admin.html';
                    }
                } catch (e) {
                    console.error('Auth check error:', e);
                }
            }
        });

        async function handleAdminLogin(e) {
            e.preventDefault();
            clearError();
            setLoading(true);

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const credential = await auth.signInWithEmailAndPassword(email, password);
                const user = credential.user;
                const doc = await db.collection('users').doc(user.uid).get();

                if (!doc.exists) {
                    setLoading(false);
                    showError('ユーザーデータが見つかりません。');
                    await auth.signOut();
                    return;
                }

                const data = doc.data();

                if (data.status !== 'active') {
                    setLoading(false);
                    showError('このアカウントは有効ではありません。');
                    await auth.signOut();
                    return;
                }

                if (data.role !== 'admin') {
                    setLoading(false);
                    showError('管理者権限がありません。');
                    await auth.signOut();
                    return;
                }

                // Admin confirmed — redirect
                window.location.href = 'admin.html';
            } catch (error) {
                setLoading(false);
                showError(getErrorMessage(error.code));
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット - Future Insight Workspace</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #1a1a2e; color: #333; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .container { width: 100%; max-width: 420px; }
  .app-header { text-align: center; margin-bottom: 32px; }
  .app-header h1 { color: #fff; font-size: 1.4rem; margin-bottom: 8px; }
  .app-header p { color: #a0aec0; font-size: 0.9rem; }
  .card {
    background: #fff; border-radius: 12px; padding: 36px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 0.95rem; background: #f7fafc;
  }
  .form-group input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }
  .btn {
    width: 100%; padding: 12px; background: #4a90d9; color: #fff; border: none;
    border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  .btn:hover { background: #3a7bc8; }
  .btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .msg {
    border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-top: 16px; display: none;
  }
  .msg-ok { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }
  .msg-err { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
  .footer { text-align: center; margin-top: 24px; }
  .footer a { color: #a0aec0; font-size: 0.8rem; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <h1>Future Insight Workspace</h1>
    <p>パスワードリセット</p>
  </div>
  <div class="card">
    <p style="font-size:0.85rem;color:#666;margin-bottom:20px">メールアドレスを入力してください。パスワードリセット用のメールを送信します。</p>
    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="example@mail.com" value="nishimura@emerging-future.org">
    </div>
    <button class="btn" id="resetBtn" onclick="sendReset()">リセットメールを送信</button>
    <div id="okMsg" class="msg msg-ok"></div>
    <div id="errMsg" class="msg msg-err"></div>
  </div>
  <div class="footer">
    <a href="index.html">ログインページに戻る</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js?v=2"></script>
<script>
  // Sign out any existing session so this page stays accessible
  auth.signOut();

  async function sendReset() {
    const email = document.getElementById('email').value.trim();
    document.getElementById('okMsg').style.display = 'none';
    document.getElementById('errMsg').style.display = 'none';
    if (!email) {
      document.getElementById('errMsg').textContent = 'メールアドレスを入力してください。';
      document.getElementById('errMsg').style.display = 'block';
      return;
    }
    document.getElementById('resetBtn').disabled = true;
    try {
      await auth.sendPasswordResetEmail(email);
      document.getElementById('okMsg').textContent = 'リセットメールを送信しました。メールを確認してください。';
      document.getElementById('okMsg').style.display = 'block';
    } catch (e) {
      // Don't reveal if email exists
      document.getElementById('okMsg').textContent = 'リセットメールを送信しました。メールを確認してください。';
      document.getElementById('okMsg').style.display = 'block';
    }
    document.getElementById('resetBtn').disabled = false;
  }
</script>
</body>
</html>
